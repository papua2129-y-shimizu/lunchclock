<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>給食タイムクロック</title>
  <style>
    :root {
      --bg-start: #fff8df;
      --bg-end: #ffe8b7;
      --panel: #fffdf4;
      --panel-strong: #ffffff;
      --text: #352515;
      --muted: #725b3b;
      --accent: #f28c28;
      --accent-dark: #c86113;
      --accent-soft: #ffe1a8;
      --yellow: #ffd65a;
      --green: #3f9b68;
      --red: #d94b36;
      --line: rgba(122, 82, 24, 0.18);
      --shadow: 0 18px 42px rgba(116, 73, 18, 0.16);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.45), rgba(255, 255, 255, 0) 38%),
        linear-gradient(160deg, var(--bg-start), var(--bg-end));
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
    }

    .app {
      width: min(1560px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: clamp(14px, 2vw, 28px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: clamp(14px, 1.8vw, 24px);
    }

    .top {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .mark {
      width: clamp(46px, 5vw, 70px);
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--panel-strong);
      box-shadow: inset 0 0 0 4px var(--accent-soft), var(--shadow);
      flex: 0 0 auto;
    }

    .mark::before {
      content: "";
      width: 54%;
      height: 54%;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 38%, #fff 0 18%, var(--yellow) 19% 100%);
      box-shadow: 0 8px 0 -4px var(--accent);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 3rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .current-time {
      text-align: center;
      font-variant-numeric: tabular-nums;
      font-size: clamp(3rem, 9vw, 8.5rem);
      font-weight: 900;
      line-height: 0.95;
      color: var(--accent-dark);
      text-shadow: 0 4px 0 rgba(255, 255, 255, 0.75);
      white-space: nowrap;
    }

    .status-box {
      justify-self: end;
      min-width: clamp(160px, 18vw, 270px);
      padding: 16px 20px;
      border-radius: var(--radius);
      background: var(--panel);
      border: 2px solid var(--line);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .status-label {
      display: block;
      color: var(--muted);
      font-size: clamp(0.9rem, 1.25vw, 1.2rem);
      font-weight: 700;
    }

    .status-value {
      display: block;
      margin-top: 4px;
      font-size: clamp(1.55rem, 3vw, 3rem);
      font-weight: 900;
    }

    .main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 0.72fr);
      gap: clamp(16px, 2vw, 26px);
      align-items: stretch;
    }

    .clock-panel,
    .side-panel,
    .records-panel {
      border-radius: var(--radius);
      background: rgba(255, 253, 244, 0.9);
      border: 2px solid var(--line);
      box-shadow: var(--shadow);
    }

    .clock-panel {
      padding: clamp(18px, 2.4vw, 34px);
      display: grid;
      gap: clamp(18px, 2vw, 28px);
      align-content: center;
      position: relative;
      overflow: hidden;
    }

    .special-message {
      min-height: clamp(42px, 5vw, 68px);
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      color: var(--accent-dark);
      background: rgba(255, 214, 90, 0.38);
      border: 2px dashed rgba(198, 97, 19, 0.35);
      font-size: clamp(1.6rem, 4vw, 4.2rem);
      font-weight: 900;
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 240ms ease, transform 240ms ease;
    }

    .special-message.show {
      opacity: 1;
      transform: translateY(0);
    }

    .time-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .metric {
      min-height: 106px;
      padding: 16px;
      display: grid;
      align-content: center;
      border-radius: var(--radius);
      background: var(--panel-strong);
      border: 2px solid var(--line);
    }

    .metric span {
      color: var(--muted);
      font-size: clamp(0.88rem, 1.25vw, 1.18rem);
      font-weight: 700;
    }

    .metric strong {
      margin-top: 6px;
      font-size: clamp(1.6rem, 3.2vw, 3.6rem);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .remaining strong {
      color: var(--green);
    }

    .progress-wrap {
      display: grid;
      gap: 12px;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 14px;
      color: var(--muted);
      font-size: clamp(1rem, 1.6vw, 1.45rem);
      font-weight: 800;
    }

    .progress-info strong {
      color: var(--text);
      font-size: clamp(1.2rem, 2.2vw, 2rem);
      font-variant-numeric: tabular-nums;
    }

    .progress-track {
      height: clamp(34px, 4.8vw, 58px);
      border-radius: 999px;
      background: #fff5cf;
      border: 3px solid rgba(198, 97, 19, 0.28);
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--yellow), var(--accent));
      box-shadow: inset 0 -8px 16px rgba(162, 86, 12, 0.18);
      transition: width 500ms ease;
    }

    .progress-track::after {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(90deg, transparent 0 9.5%, rgba(255,255,255,0.45) 9.5% 10%);
      pointer-events: none;
    }

    .itadakimasu-area {
      display: grid;
      grid-template-columns: minmax(240px, 0.8fr) 1fr;
      gap: 16px;
      align-items: stretch;
    }

    .primary-button {
      min-height: clamp(112px, 14vw, 176px);
      border-radius: var(--radius);
      color: #fff;
      background: linear-gradient(180deg, #ffae42, var(--accent));
      box-shadow: 0 12px 0 var(--accent-dark), 0 20px 36px rgba(168, 88, 12, 0.25);
      font-size: clamp(2rem, 4.6vw, 5rem);
      font-weight: 900;
      letter-spacing: 0;
    }

    .primary-button:active {
      transform: translateY(5px);
      box-shadow: 0 7px 0 var(--accent-dark), 0 14px 28px rgba(168, 88, 12, 0.23);
    }

    .today-card {
      padding: clamp(18px, 2vw, 28px);
      border-radius: var(--radius);
      background: var(--panel-strong);
      border: 2px solid var(--line);
      display: grid;
      align-content: center;
      gap: 10px;
    }

    .today-card span {
      color: var(--muted);
      font-size: clamp(1rem, 1.5vw, 1.35rem);
      font-weight: 800;
    }

    .today-card strong {
      font-size: clamp(1.8rem, 3.7vw, 4rem);
      line-height: 1.05;
      font-variant-numeric: tabular-nums;
    }

    .message {
      min-height: 32px;
      color: var(--accent-dark);
      font-size: clamp(1rem, 1.5vw, 1.35rem);
      font-weight: 800;
    }

    .side-panel {
      padding: clamp(16px, 2vw, 28px);
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .record-card {
      padding: clamp(18px, 2vw, 26px);
      border-radius: var(--radius);
      background: var(--panel-strong);
      border: 2px solid var(--line);
    }

    .record-card h2,
    .records-panel h2,
    .settings-panel h2 {
      margin: 0;
      font-size: clamp(1.25rem, 2.1vw, 2rem);
    }

    .fastest-value {
      margin-top: 12px;
      color: var(--accent-dark);
      font-size: clamp(1.55rem, 3vw, 3.2rem);
      font-weight: 900;
      line-height: 1.15;
    }

    .fastest-detail {
      margin-top: 8px;
      color: var(--muted);
      font-size: clamp(1rem, 1.35vw, 1.25rem);
      font-weight: 700;
    }

    .new-record {
      min-height: clamp(50px, 6vw, 84px);
      display: none;
      place-items: center;
      border-radius: var(--radius);
      color: #fff;
      background: linear-gradient(90deg, var(--red), var(--accent));
      font-size: clamp(1.8rem, 4vw, 4rem);
      font-weight: 900;
      box-shadow: var(--shadow);
    }

    .new-record.show {
      display: grid;
      animation: pop 700ms ease both;
    }

    .records-panel {
      padding: clamp(16px, 2vw, 24px);
      display: grid;
      gap: 14px;
    }

    .records-table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: var(--radius);
      background: var(--panel-strong);
      font-size: clamp(0.95rem, 1.35vw, 1.25rem);
    }

    .records-table th,
    .records-table td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-variant-numeric: tabular-nums;
    }

    .records-table th {
      color: var(--muted);
      background: #fff3c5;
      font-weight: 900;
    }

    .empty-records {
      margin: 0;
      color: var(--muted);
      font-size: clamp(1rem, 1.4vw, 1.25rem);
      font-weight: 700;
    }

    .bottom {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
    }

    .settings-toggle,
    .secondary-button,
    .danger-button {
      min-height: 54px;
      padding: 0 22px;
      border-radius: var(--radius);
      font-weight: 900;
      font-size: clamp(1rem, 1.35vw, 1.25rem);
    }

    .settings-toggle,
    .secondary-button {
      color: var(--text);
      background: var(--yellow);
      border: 2px solid rgba(198, 97, 19, 0.35);
    }

    .danger-button {
      color: #fff;
      background: var(--red);
    }

    .settings-panel {
      position: fixed;
      inset: 0 0 0 auto;
      width: min(560px, 100%);
      padding: clamp(18px, 2.2vw, 28px);
      background: var(--panel);
      box-shadow: -20px 0 42px rgba(77, 47, 9, 0.24);
      transform: translateX(105%);
      transition: transform 240ms ease;
      z-index: 20;
      overflow-y: auto;
      border-left: 3px solid var(--line);
    }

    .settings-panel.open {
      transform: translateX(0);
    }

    .settings-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .close-button {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--text);
      font-size: 2rem;
      font-weight: 900;
    }

    .form-grid {
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      color: var(--muted);
      font-weight: 900;
      font-size: 1.05rem;
    }

    .field input {
      width: 100%;
      min-height: 54px;
      padding: 8px 12px;
      border-radius: var(--radius);
      border: 2px solid var(--line);
      background: #fff;
      color: var(--text);
      font-size: 1.2rem;
    }

    .settings-actions,
    .record-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
    }

    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 30;
    }

    .confetti span {
      position: absolute;
      top: -20px;
      width: 12px;
      height: 20px;
      border-radius: 2px;
      background: var(--yellow);
      opacity: 0;
      animation: fall 1800ms ease-in forwards;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    @keyframes pop {
      0% { transform: scale(0.92); }
      60% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    @keyframes fall {
      0% { opacity: 0; transform: translateY(-20px) rotate(0deg); }
      10% { opacity: 1; }
      100% { opacity: 0; transform: translateY(105vh) rotate(220deg); }
    }

    @media (max-width: 980px) {
      .top,
      .main,
      .bottom,
      .itadakimasu-area {
        grid-template-columns: 1fr;
      }

      .current-time,
      .status-box {
        justify-self: stretch;
      }

      .brand {
        justify-content: center;
      }

      h1,
      .status-box {
        text-align: center;
      }
    }

    @media (max-width: 680px) {
      .app {
        padding: 12px;
      }

      .time-grid {
        grid-template-columns: 1fr;
      }

      .records-table th,
      .records-table td {
        padding: 10px 7px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <h1>給食タイムクロック</h1>
      </div>
      <div class="current-time" id="currentTime">--:--:--</div>
      <div class="status-box" aria-live="polite">
        <span class="status-label">いまの状態</span>
        <strong class="status-value" id="statusValue">確認中</strong>
      </div>
    </header>

    <main class="main">
      <section class="clock-panel" aria-label="給食時間">
        <div class="special-message" id="specialMessage"></div>

        <div class="time-grid">
          <div class="metric remaining">
            <span>ごちそうさままで</span>
            <strong id="remainingTime">--:--</strong>
          </div>
          <div class="metric">
            <span>開始時刻</span>
            <strong id="startDisplay">12:15</strong>
          </div>
          <div class="metric">
            <span>終了時刻</span>
            <strong id="endDisplay">13:00</strong>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-info">
            <span>給食の進み具合</span>
            <strong id="progressPercent">0%</strong>
          </div>
          <div class="progress-track" aria-label="進行バー">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>

        <div class="itadakimasu-area">
          <button class="primary-button" id="recordButton" type="button">いただきます</button>
          <div class="today-card" aria-live="polite">
            <span>今日のいただきます</span>
            <strong id="todayRecord">未記録</strong>
            <div class="message" id="message"></div>
          </div>
        </div>
      </section>

      <aside class="side-panel">
        <div class="new-record" id="newRecordBanner">新記録！</div>
        <section class="record-card" aria-label="最速記録">
          <h2>最速記録</h2>
          <div class="fastest-value" id="fastestValue">まだありません</div>
          <div class="fastest-detail" id="fastestDetail">最初の記録を待っています</div>
        </section>
        <section class="records-panel" aria-label="最新記録">
          <h2>最新記録</h2>
          <div id="recordsList"></div>
        </section>
      </aside>
    </main>

    <footer class="bottom">
      <div class="sr-only" id="storageStatus" aria-live="polite"></div>
      <button class="settings-toggle" id="settingsOpen" type="button">設定を開く</button>
    </footer>
  </div>

  <aside class="settings-panel" id="settingsPanel" aria-hidden="true">
    <div class="settings-head">
      <h2>設定</h2>
      <button class="close-button" id="settingsClose" type="button" aria-label="設定を閉じる">×</button>
    </div>

    <div class="form-grid">
      <div class="field">
        <label for="startInput">給食開始時刻</label>
        <input id="startInput" type="time" step="60" value="12:15">
      </div>
      <div class="field">
        <label for="endInput">給食終了時刻</label>
        <input id="endInput" type="time" step="60" value="13:00">
      </div>
      <div class="field">
        <label for="specialTimeInput">特別メッセージ時刻</label>
        <input id="specialTimeInput" type="time" step="60" value="12:47">
      </div>
      <div class="field">
        <label for="specialTextInput">特別メッセージ本文</label>
        <input id="specialTextInput" type="text" value="MMT" maxlength="24">
      </div>
      <div class="settings-actions">
        <button class="secondary-button" id="saveSettings" type="button">設定を保存</button>
      </div>
      <section class="record-card">
        <h2>記録管理</h2>
        <div class="record-actions">
          <button class="secondary-button" id="resetToday" type="button">今日の記録をリセット</button>
          <button class="danger-button" id="deleteAll" type="button">全記録削除</button>
        </div>
      </section>
    </div>
  </aside>

  <div class="confetti" id="confetti" aria-hidden="true"></div>

  <script>
    (() => {
      "use strict";

      const STORAGE_KEYS = {
        settings: "lunchClock.settings.v1",
        records: "lunchClock.records.v1"
      };

      const DEFAULT_SETTINGS = {
        startTime: "12:15",
        endTime: "13:00",
        specialTime: "12:47",
        specialText: "MMT"
      };

      const $ = (id) => document.getElementById(id);
      const elements = {
        currentTime: $("currentTime"),
        statusValue: $("statusValue"),
        remainingTime: $("remainingTime"),
        startDisplay: $("startDisplay"),
        endDisplay: $("endDisplay"),
        progressPercent: $("progressPercent"),
        progressFill: $("progressFill"),
        recordButton: $("recordButton"),
        todayRecord: $("todayRecord"),
        message: $("message"),
        fastestValue: $("fastestValue"),
        fastestDetail: $("fastestDetail"),
        recordsList: $("recordsList"),
        specialMessage: $("specialMessage"),
        newRecordBanner: $("newRecordBanner"),
        confetti: $("confetti"),
        settingsOpen: $("settingsOpen"),
        settingsClose: $("settingsClose"),
        settingsPanel: $("settingsPanel"),
        startInput: $("startInput"),
        endInput: $("endInput"),
        specialTimeInput: $("specialTimeInput"),
        specialTextInput: $("specialTextInput"),
        saveSettings: $("saveSettings"),
        resetToday: $("resetToday"),
        deleteAll: $("deleteAll"),
        storageStatus: $("storageStatus")
      };

      let settings = loadSettings();
      let records = loadRecords();
      let newRecordTimer = null;

      function isHHMM(value) {
        return /^([01]\d|2[0-3]):[0-5]\d$/.test(value);
      }

      function loadSettings() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEYS.settings) || "null");
          if (!saved || typeof saved !== "object") return { ...DEFAULT_SETTINGS };
          return {
            startTime: isHHMM(saved.startTime) ? saved.startTime : DEFAULT_SETTINGS.startTime,
            endTime: isHHMM(saved.endTime) ? saved.endTime : DEFAULT_SETTINGS.endTime,
            specialTime: isHHMM(saved.specialTime) ? saved.specialTime : DEFAULT_SETTINGS.specialTime,
            specialText: String(saved.specialText || DEFAULT_SETTINGS.specialText).slice(0, 24)
          };
        } catch (error) {
          return { ...DEFAULT_SETTINGS };
        }
      }

      function saveSettingsToStorage() {
        localStorage.setItem(STORAGE_KEYS.settings, JSON.stringify(settings));
      }

      function loadRecords() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEYS.records) || "[]");
          if (!Array.isArray(saved)) return [];
          return saved.filter((record) => {
            return record &&
              /^\d{4}-\d{2}-\d{2}$/.test(record.date) &&
              isHHMM(record.time) &&
              Number.isFinite(record.elapsedSeconds) &&
              Number.isFinite(record.timestamp);
          }).map((record) => ({
            date: record.date,
            time: record.time,
            elapsedSeconds: Math.max(0, Math.round(record.elapsedSeconds)),
            elapsedText: formatDuration(Math.max(0, Math.round(record.elapsedSeconds))),
            timestamp: record.timestamp
          })).sort((a, b) => b.timestamp - a.timestamp);
        } catch (error) {
          return [];
        }
      }

      function saveRecordsToStorage() {
        localStorage.setItem(STORAGE_KEYS.records, JSON.stringify(records));
      }

      function getTokyoParts(date = new Date()) {
        const formatter = new Intl.DateTimeFormat("ja-JP", {
          timeZone: "Asia/Tokyo",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false
        });
        const parts = Object.fromEntries(formatter.formatToParts(date).map((part) => [part.type, part.value]));
        return {
          year: parts.year,
          month: parts.month,
          day: parts.day,
          hour: parts.hour,
          minute: parts.minute,
          second: parts.second
        };
      }

      function getTokyoDateKey(date = new Date()) {
        const parts = getTokyoParts(date);
        return `${parts.year}-${parts.month}-${parts.day}`;
      }

      function getTokyoHHMM(date = new Date()) {
        const parts = getTokyoParts(date);
        return `${parts.hour}:${parts.minute}`;
      }

      function getTokyoClockText(date = new Date()) {
        const parts = getTokyoParts(date);
        return `${parts.hour}:${parts.minute}:${parts.second}`;
      }

      function timeToMinutes(time) {
        const [hour, minute] = time.split(":").map(Number);
        return hour * 60 + minute;
      }

      function currentTokyoSeconds(date = new Date()) {
        const parts = getTokyoParts(date);
        return Number(parts.hour) * 3600 + Number(parts.minute) * 60 + Number(parts.second);
      }

      function secondsFromHHMM(time) {
        return timeToMinutes(time) * 60;
      }

      function formatDuration(totalSeconds) {
        const safeSeconds = Math.max(0, Math.round(totalSeconds));
        const minutes = Math.floor(safeSeconds / 60);
        const seconds = safeSeconds % 60;
        return `${minutes}分${String(seconds).padStart(2, "0")}秒`;
      }

      function formatRemaining(totalSeconds) {
        const safeSeconds = Math.max(0, Math.round(totalSeconds));
        const minutes = Math.floor(safeSeconds / 60);
        const seconds = safeSeconds % 60;
        return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function todayRecord() {
        const today = getTokyoDateKey();
        return records.find((record) => record.date === today) || null;
      }

      function getFastestRecord() {
        if (records.length === 0) return null;
        return records.reduce((fastest, record) => {
          if (!fastest) return record;
          if (record.elapsedSeconds < fastest.elapsedSeconds) return record;
          return fastest;
        }, null);
      }

      function getStatus(nowSeconds, startSeconds, endSeconds) {
        const cleanupEnd = endSeconds + 10 * 60;
        if (nowSeconds < startSeconds) return "準備中";
        if (nowSeconds <= endSeconds) return "給食中";
        if (nowSeconds <= cleanupEnd) return "片付け";
        return "給食時間外";
      }

      function updateClock() {
        const now = new Date();
        const nowSeconds = currentTokyoSeconds(now);
        const startSeconds = secondsFromHHMM(settings.startTime);
        const endSeconds = secondsFromHHMM(settings.endTime);
        const duration = Math.max(60, endSeconds - startSeconds);
        const elapsed = clamp(nowSeconds - startSeconds, 0, duration);
        const progress = clamp((elapsed / duration) * 100, 0, 100);
        const remaining = clamp(endSeconds - nowSeconds, 0, duration);

        elements.currentTime.textContent = getTokyoClockText(now);
        elements.statusValue.textContent = getStatus(nowSeconds, startSeconds, endSeconds);
        elements.remainingTime.textContent = formatRemaining(remaining);
        elements.startDisplay.textContent = settings.startTime;
        elements.endDisplay.textContent = settings.endTime;
        elements.progressPercent.textContent = `${Math.round(progress)}%`;
        elements.progressFill.style.width = `${progress}%`;

        const currentHM = getTokyoHHMM(now);
        const shouldShowSpecial = currentHM === settings.specialTime && settings.specialText.trim() !== "";
        elements.specialMessage.textContent = settings.specialText;
        elements.specialMessage.classList.toggle("show", shouldShowSpecial);
      }

      function renderToday() {
        const record = todayRecord();
        elements.todayRecord.textContent = record ? `${record.time}（${record.elapsedText}）` : "未記録";
      }

      function renderFastest() {
        const fastest = getFastestRecord();
        if (!fastest) {
          elements.fastestValue.textContent = "まだありません";
          elements.fastestDetail.textContent = "最初の記録を待っています";
          return;
        }
        elements.fastestValue.textContent = `${fastest.elapsedText}`;
        elements.fastestDetail.textContent = `${fastest.date} ${fastest.time} にいただきます`;
      }

      function renderRecords() {
        const latest = records.slice().sort((a, b) => b.timestamp - a.timestamp).slice(0, 10);
        if (latest.length === 0) {
          elements.recordsList.innerHTML = '<p class="empty-records">記録はまだありません。</p>';
          return;
        }

        const rows = latest.map((record) => {
          return `<tr><td>${escapeHTML(record.date)}</td><td>${escapeHTML(record.time)}</td><td>${escapeHTML(record.elapsedText)}</td></tr>`;
        }).join("");

        elements.recordsList.innerHTML = `
          <table class="records-table">
            <thead>
              <tr><th>日付</th><th>いただきます時刻</th><th>開始から</th></tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        `;
      }

      function renderSettings() {
        elements.startInput.value = settings.startTime;
        elements.endInput.value = settings.endTime;
        elements.specialTimeInput.value = settings.specialTime;
        elements.specialTextInput.value = settings.specialText;
      }

      function renderAll() {
        renderToday();
        renderFastest();
        renderRecords();
        renderSettings();
        updateClock();
      }

      function escapeHTML(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function setMessage(text) {
        elements.message.textContent = text;
        window.clearTimeout(setMessage.timer);
        if (text) {
          setMessage.timer = window.setTimeout(() => {
            elements.message.textContent = "";
          }, 6000);
        }
      }

      function recordItadakimasu() {
        const today = getTokyoDateKey();
        if (records.some((record) => record.date === today)) {
          setMessage("今日はすでに記録されています。変更する場合は設定からリセットしてください。");
          return;
        }

        const fastestBefore = getFastestRecord();
        const now = new Date();
        const nowSeconds = currentTokyoSeconds(now);
        const startSeconds = secondsFromHHMM(settings.startTime);
        const elapsedSeconds = Math.max(0, nowSeconds - startSeconds);
        const record = {
          date: today,
          time: getTokyoHHMM(now),
          elapsedSeconds,
          elapsedText: formatDuration(elapsedSeconds),
          timestamp: Date.now()
        };

        records.unshift(record);
        saveRecordsToStorage();
        renderAll();
        setMessage("今日のいただきますを記録しました。");

        if (!fastestBefore || record.elapsedSeconds < fastestBefore.elapsedSeconds) {
          showNewRecord();
        }
      }

      function showNewRecord() {
        elements.newRecordBanner.classList.add("show");
        createConfetti();
        window.clearTimeout(newRecordTimer);
        newRecordTimer = window.setTimeout(() => {
          elements.newRecordBanner.classList.remove("show");
        }, 7000);
      }

      function createConfetti() {
        elements.confetti.innerHTML = "";
        const colors = ["#ffd65a", "#f28c28", "#3f9b68", "#d94b36", "#ffffff"];
        for (let i = 0; i < 34; i += 1) {
          const piece = document.createElement("span");
          piece.style.left = `${Math.random() * 100}%`;
          piece.style.background = colors[i % colors.length];
          piece.style.animationDelay = `${Math.random() * 500}ms`;
          piece.style.animationDuration = `${1400 + Math.random() * 900}ms`;
          piece.style.transform = `rotate(${Math.random() * 180}deg)`;
          elements.confetti.appendChild(piece);
        }
        window.setTimeout(() => {
          elements.confetti.innerHTML = "";
        }, 2800);
      }

      function openSettings() {
        elements.settingsPanel.classList.add("open");
        elements.settingsPanel.setAttribute("aria-hidden", "false");
        elements.startInput.focus();
      }

      function closeSettings() {
        elements.settingsPanel.classList.remove("open");
        elements.settingsPanel.setAttribute("aria-hidden", "true");
        elements.settingsOpen.focus();
      }

      function saveSettings() {
        const next = {
          startTime: elements.startInput.value,
          endTime: elements.endInput.value,
          specialTime: elements.specialTimeInput.value,
          specialText: elements.specialTextInput.value.trim() || DEFAULT_SETTINGS.specialText
        };

        if (!isHHMM(next.startTime) || !isHHMM(next.endTime) || !isHHMM(next.specialTime)) {
          alert("時刻はHH:MM形式で入力してください。");
          return;
        }

        if (timeToMinutes(next.endTime) <= timeToMinutes(next.startTime)) {
          alert("終了時刻は開始時刻より後にしてください。");
          return;
        }

        settings = next;
        saveSettingsToStorage();
        renderAll();
        setMessage("設定を保存しました。");
        elements.storageStatus.textContent = "設定を保存しました。";
      }

      function resetTodayRecord() {
        if (!confirm("今日の記録だけをリセットしますか？")) return;
        const today = getTokyoDateKey();
        const before = records.length;
        records = records.filter((record) => record.date !== today);
        if (records.length !== before) {
          saveRecordsToStorage();
          renderAll();
          setMessage("今日の記録をリセットしました。");
        } else {
          setMessage("今日の記録はありません。");
        }
      }

      function deleteAllRecords() {
        if (!confirm("すべての記録を削除します。この操作は元に戻せません。よろしいですか？")) return;
        records = [];
        saveRecordsToStorage();
        renderAll();
        setMessage("すべての記録を削除しました。");
      }

      elements.recordButton.addEventListener("click", recordItadakimasu);
      elements.settingsOpen.addEventListener("click", openSettings);
      elements.settingsClose.addEventListener("click", closeSettings);
      elements.saveSettings.addEventListener("click", saveSettings);
      elements.resetToday.addEventListener("click", resetTodayRecord);
      elements.deleteAll.addEventListener("click", deleteAllRecords);
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && elements.settingsPanel.classList.contains("open")) {
          closeSettings();
        }
      });

      renderAll();
      window.setInterval(updateClock, 1000);
    })();
  </script>
</body>
</html>
